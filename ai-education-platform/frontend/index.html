<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI个性化教育平台</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="app">
    
    <div id="initialLoading" class="loading-page">
      <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i></div>
      <p>加载中...</p>
    </div>
    
    
    <div id="vueContent" style="display:none">
      
      <div v-if="isLoggedIn" class="app-layout">
      <aside :class="['sidebar', sidebarCollapsed ? 'collapsed' : '']">
        <div class="sidebar-header">
          <div class="sidebar-logo"><i class="fas fa-graduation-cap"></i></div>
          <span v-show="!sidebarCollapsed" class="sidebar-title">AI教育平台</span>
          <button class="sidebar-toggle" @click="sidebarCollapsed = !sidebarCollapsed">
            <i :class="sidebarCollapsed ? 'fas fa-angle-right' : 'fas fa-angle-left'"></i>
          </button>
        </div>
        <nav class="sidebar-nav">
          <router-link v-for="item in menuItems" :key="item.path" :to="item.path"
            :class="['nav-item', $route.path === item.path ? 'active' : '']">
            <i :class="item.icon"></i>
            <span v-show="!sidebarCollapsed">{{ item.label }}</span>
            <span v-if="item.badge && !sidebarCollapsed" class="nav-badge">{{ item.badge }}</span>
          </router-link>
        </nav>
        <div class="sidebar-footer">
          <div class="user-card" v-show="!sidebarCollapsed">
            <div class="user-avatar">{{ currentUser?.name?.[0] }}</div>
            <div class="user-info">
              <div class="user-name">{{ currentUser?.name }}</div>
              <div class="user-role">{{ roleLabel }}</div>
            </div>
          </div>
          <button class="nav-item logout-btn" @click="handleLogout">
            <i class="fas fa-sign-out-alt"></i>
            <span v-show="!sidebarCollapsed">退出登录</span>
          </button>
        </div>
      </aside>
      <main class="main-content">
        <header class="top-bar">
          <div class="breadcrumb">
            <span class="page-title">{{ currentPageTitle }}</span>
          </div>
          <div class="top-bar-actions">
            <span class="time-display">{{ currentTime }}</span>
          </div>
        </header>
        <div class="content-area">
          <router-view></router-view>
        </div>
      </main>
    </div>

    
    <div id="toast" class="toast" style="display:none">
      <i id="toastIcon"></i> <span id="toastMessage"></span>
    </div>
    </div> 
  </div> 

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue-router/4.2.4/vue-router.global.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/login-handler.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
